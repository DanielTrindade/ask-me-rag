name: Deploy production

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

permissions: {}

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  deploy:
    name: Trigger Vercel deployment
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main' &&
      vars.VERCEL_DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: production

    steps:
      - name: Trigger validated production deployment
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$VERCEL_DEPLOY_HOOK_URL" ]; then
            echo "::error::Configure the VERCEL_DEPLOY_HOOK_URL repository secret."
            exit 1
          fi

          curl --fail --silent --show-error             --request POST             "$VERCEL_DEPLOY_HOOK_URL"
