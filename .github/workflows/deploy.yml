name: Promote production image

on:
  workflow_dispatch:
    inputs:
      git_sha:
        description: Full 40-character Git SHA of an existing image
        required: true
        type: string

permissions: {}

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  promote:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    permissions:
      contents: read
      id-token: write
    env:
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      GCP_REGION: ${{ vars.GCP_REGION }}
      CLOUD_RUN_SERVICE: ${{ vars.CLOUD_RUN_SERVICE }}
      ARTIFACT_REPOSITORY: ${{ vars.ARTIFACT_REPOSITORY }}

    steps:
      - name: Validate SHA
        env:
          IMAGE_TAG: ${{ inputs.git_sha }}
        run: '[[ "$IMAGE_TAG" =~ ^[0-9a-f]{40}$ ]]'

      - name: Checkout main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3

      - name: Verify image and environment
        env:
          IMAGE_TAG: ${{ inputs.git_sha }}
        run: bash scripts/preflight-deploy.sh

      - name: Promote existing image without rebuilding
        env:
          IMAGE_TAG: ${{ inputs.git_sha }}
        run: |
          gcloud builds submit . \
            --project="$GCP_PROJECT_ID" \
            --config=cloudbuild-promote.yaml \
            --substitutions="_IMAGE_TAG=$IMAGE_TAG,_REGION=$GCP_REGION,_REPOSITORY=$ARTIFACT_REPOSITORY,_SERVICE=$CLOUD_RUN_SERVICE" \
            --quiet
