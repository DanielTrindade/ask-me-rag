steps:
  # 1. Build the container image
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - --tag
      - us-central1-docker.pkg.dev/$PROJECT_ID/ask-me-rag/ask-me-rag:$_IMAGE_TAG
      - --tag
      - us-central1-docker.pkg.dev/$PROJECT_ID/ask-me-rag/ask-me-rag:latest
      - --build-arg
      - NEXT_PUBLIC_SUPABASE_URL=$_NEXT_PUBLIC_SUPABASE_URL
      - .

  # 2. Push to Artifact Registry
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - us-central1-docker.pkg.dev/$PROJECT_ID/ask-me-rag/ask-me-rag:$_IMAGE_TAG

  # 3. Deploy to Cloud Run (secure: least-privilege SA, secrets as env vars, no ingress from anywhere except public HTTPS)
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ask-me-rag
      - --image=us-central1-docker.pkg.dev/$PROJECT_ID/ask-me-rag/ask-me-rag:$_IMAGE_TAG
      - --region=us-central1
      - --service-account=ask-me-rag-sa@$PROJECT_ID.iam.gserviceaccount.com
      - --allow-unauthenticated
      - --ingress=all
      - --min-instances=0
      - --max-instances=3
      - --memory=512Mi
      - --cpu=1000m
      - --concurrency=10
      - --timeout=300
      - --set-env-vars=LLM_PROVIDER=google,GOOGLE_MODEL=gemini-2.5-flash,NEXT_PUBLIC_SUPABASE_URL=$_NEXT_PUBLIC_SUPABASE_URL
      - --set-secrets=GOOGLE_GENERATIVE_AI_API_KEY=google-generative-ai-api-key:latest,SUPABASE_SERVICE_ROLE_KEY=supabase-service-role-key:latest,ADMIN_PASSWORD=admin-password:latest,ANTHROPIC_API_KEY=anthropic-api-key:latest,OPENAI_API_KEY=openai-api-key:latest
      - --quiet

images:
  - us-central1-docker.pkg.dev/$PROJECT_ID/ask-me-rag/ask-me-rag:$_IMAGE_TAG

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

substitutions:
  _NEXT_PUBLIC_SUPABASE_URL: "https://xjemdvtnudsjhttnnwol.supabase.co"
  _IMAGE_TAG: "latest"

timeout: 1200s