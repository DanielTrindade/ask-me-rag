steps:
  - id: validate-tag
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -ceu
      - |
        [[ "$_IMAGE_TAG" =~ ^[0-9a-f]{40}$ ]] || {
          echo "_IMAGE_TAG must be a full Git SHA." >&2
          exit 2
        }

  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --label=org.opencontainers.image.revision=$_IMAGE_TAG
      - --label=org.opencontainers.image.source=https://github.com/$_GITHUB_REPOSITORY
      - --tag=$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPOSITORY/$_SERVICE:$_IMAGE_TAG
      - --build-arg=NEXT_PUBLIC_SUPABASE_URL=$_NEXT_PUBLIC_SUPABASE_URL
      - .

  - id: push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - $_REGION-docker.pkg.dev/$PROJECT_ID/$_REPOSITORY/$_SERVICE:$_IMAGE_TAG

  - id: resolve-digest
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -ceu
      - |
        image="$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPOSITORY/$_SERVICE:$_IMAGE_TAG"
        digest="$(gcloud artifacts docker images describe "$image" --project="$PROJECT_ID" --format='value(image_summary.fully_qualified_digest)')"
        [[ "$digest" == *@sha256:* ]] || { echo "Could not resolve image digest." >&2; exit 1; }
        printf '%s' "$digest" > /workspace/image-digest.txt
        echo "Resolved immutable image digest."

  - id: deploy-candidate-and-promote
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    env:
      - GCP_PROJECT_ID=$PROJECT_ID
      - GCP_REGION=$_REGION
      - CLOUD_RUN_SERVICE=$_SERVICE
      - RUNTIME_SERVICE_ACCOUNT=$_RUNTIME_SERVICE_ACCOUNT
      - GITHUB_REPOSITORY=$_GITHUB_REPOSITORY
      - EXPECTED_GIT_SHA=$_IMAGE_TAG
      - CHAT_OBSERVABILITY_ENABLED=$_CHAT_OBSERVABILITY_ENABLED
      - CHAT_TRUSTED_PROXY_HOPS=$_CHAT_TRUSTED_PROXY_HOPS
      - CHAT_IP_HMAC_SECRET=$_CHAT_IP_HMAC_SECRET
      - CHAT_IP_ENCRYPTION_SECRET=$_CHAT_IP_ENCRYPTION_SECRET
      - BUILD_ID=$BUILD_ID
    args:
      - -ceu
      - |
        export IMAGE_DIGEST="$(cat /workspace/image-digest.txt)"
        bash scripts/deploy-cloud-run.sh

  - id: deploy-observability-retention
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -ceu
      - |
        [[ "$_DEPLOY_OBSERVABILITY_RETENTION" == "true" ]] || {
          echo "Observability retention deployment is disabled."
          exit 0
        }
        export PROJECT_ID="$PROJECT_ID"
        export REGION="$_REGION"
        export IMAGE="$(cat /workspace/image-digest.txt)"
        export JOB_SERVICE_ACCOUNT="$_RETENTION_JOB_SERVICE_ACCOUNT"
        export SCHEDULER_SERVICE_ACCOUNT="$_RETENTION_SCHEDULER_SERVICE_ACCOUNT"
        export SUPABASE_URL="$_NEXT_PUBLIC_SUPABASE_URL"
        export SUPABASE_SERVICE_KEY_SECRET="$_SUPABASE_SERVICE_KEY_SECRET"
        bash scripts/deploy-chat-observability-retention.sh

images:
  - $_REGION-docker.pkg.dev/$PROJECT_ID/$_REPOSITORY/$_SERVICE:$_IMAGE_TAG

serviceAccount: projects/$PROJECT_ID/serviceAccounts/cloudbuild-deploy@$PROJECT_ID.iam.gserviceaccount.com

options:
  dynamicSubstitutions: true
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

substitutions:
  _REGION: us-central1
  _REPOSITORY: ask-me-rag
  _SERVICE: ask-me-rag
  _IMAGE_TAG: invalid
  _NEXT_PUBLIC_SUPABASE_URL: https://xjemdvtnudsjhttnnwol.supabase.co
  _RUNTIME_SERVICE_ACCOUNT: ask-me-rag-sa@ask-me-rag.iam.gserviceaccount.com
  _GITHUB_REPOSITORY: DanielTrindade/ask-me-rag
  _CHAT_OBSERVABILITY_ENABLED: 'false'
  _CHAT_TRUSTED_PROXY_HOPS: unset
  _CHAT_IP_HMAC_SECRET: ask-me-chat-ip-hmac-key
  _CHAT_IP_ENCRYPTION_SECRET: ask-me-chat-ip-encryption-keys
  _DEPLOY_OBSERVABILITY_RETENTION: 'false'
  _RETENTION_JOB_SERVICE_ACCOUNT: ask-me-retention-job@${PROJECT_ID}.iam.gserviceaccount.com
  _RETENTION_SCHEDULER_SERVICE_ACCOUNT: ask-me-retention-scheduler@${PROJECT_ID}.iam.gserviceaccount.com
  _SUPABASE_SERVICE_KEY_SECRET: supabase-service-role-key

timeout: 1200s
