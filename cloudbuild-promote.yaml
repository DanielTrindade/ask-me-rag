steps:
  - id: validate-tag
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -ceu
      - |
        [[ "$_IMAGE_TAG" =~ ^[0-9a-f]{40}$ ]] || { echo "_IMAGE_TAG must be a full Git SHA." >&2; exit 2; }

  - id: resolve-existing-digest
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -ceu
      - |
        image="$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPOSITORY/$_SERVICE:$_IMAGE_TAG"
        digest="$(gcloud artifacts docker images describe "$image" --project="$PROJECT_ID" --format='value(image_summary.fully_qualified_digest)')"
        [[ "$digest" == *@sha256:* ]] || { echo "Existing image was not found." >&2; exit 1; }
        printf '%s' "$digest" > /workspace/image-digest.txt

  - id: safely-promote-existing-image
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    env:
      - GCP_PROJECT_ID=$PROJECT_ID
      - GCP_REGION=$_REGION
      - CLOUD_RUN_SERVICE=$_SERVICE
      - RUNTIME_SERVICE_ACCOUNT=$_RUNTIME_SERVICE_ACCOUNT
      - GITHUB_REPOSITORY=$_GITHUB_REPOSITORY
      - EXPECTED_GIT_SHA=$_IMAGE_TAG
      - BUILD_ID=$BUILD_ID
      - SKIP_HEAD_CHECK=true
    args:
      - -ceu
      - |
        export IMAGE_DIGEST="$(cat /workspace/image-digest.txt)"
        bash scripts/deploy-cloud-run.sh

serviceAccount: projects/$PROJECT_ID/serviceAccounts/cloudbuild-deploy@$PROJECT_ID.iam.gserviceaccount.com

options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _REGION: us-central1
  _REPOSITORY: ask-me-rag
  _SERVICE: ask-me-rag
  _IMAGE_TAG: invalid
  _RUNTIME_SERVICE_ACCOUNT: ask-me-rag-sa@ask-me-rag.iam.gserviceaccount.com
  _GITHUB_REPOSITORY: DanielTrindade/ask-me-rag

timeout: 600s
